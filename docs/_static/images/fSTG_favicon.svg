<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified t2 graph — hub-spoke with color diversity -->
  <!-- Edges (thick for visibility) -->
  <line x1="28" y1="10" x2="42" y2="24" stroke="rgb(55, 138, 221)" stroke-width="3" opacity="0.75"/>
  <line x1="28" y1="10" x2="14" y2="28" stroke="rgb(127, 119, 221)" stroke-width="2" opacity="0.5"/>
  <line x1="42" y1="30" x2="14" y2="32" stroke="rgb(55, 138, 221)" stroke-width="2.5" opacity="0.6"/>
  <line x1="42" y1="30" x2="30" y2="42" stroke="rgb(127, 119, 221)" stroke-width="2" opacity="0.5"/>
  <line x1="42" y1="30" x2="28" y2="24" stroke="rgb(175, 100, 50)" stroke-width="2" opacity="0.55"/>

  <!-- Nodes -->
  <circle cx="28" cy="8" r="6" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)" stroke-width="2.5"/>
  <circle cx="12" cy="32" r="4.5" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)" stroke-width="2"/>
  <circle cx="44" cy="28" r="9" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)" stroke-width="3"/>
  <circle cx="30" cy="44" r="5" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)" stroke-width="2" opacity="0.8"/>
  <circle cx="26" cy="24" r="4" fill="rgb(255, 237, 220)" stroke="rgb(175, 100, 50)" stroke-width="2" opacity="0.8"/>

  <!-- Big solid arrow underneath — line + filled triangle head -->
  <line x1="6" y1="56" x2="46" y2="56" stroke="rgb(83, 74, 183)" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  <polygon points="46,50 58,56 46,62" fill="rgb(83, 74, 183)" opacity="0.6"/>
</svg>