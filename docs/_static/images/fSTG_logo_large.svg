<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="timeArrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="7" orient="auto">
      <path d="M0 0L9 3.5L0 7" fill="rgb(83, 74, 183)" opacity="0.7"/>
    </marker>
  </defs>

  <!-- === TIMELINE: variant A style — solid line + arrow + tick marks === -->
  <line x1="38" y1="268" x2="348" y2="268" stroke="rgb(83, 74, 183)" stroke-width="1.5" opacity="0.5" marker-end="url(#timeArrow)"/>
  <line x1="92" y1="264" x2="92" y2="272" stroke="rgb(83, 74, 183)" stroke-width="1" opacity="0.35"/>
  <line x1="198" y1="264" x2="198" y2="272" stroke="rgb(83, 74, 183)" stroke-width="1" opacity="0.35"/>
  <line x1="310" y1="264" x2="310" y2="272" stroke="rgb(83, 74, 183)" stroke-width="1" opacity="0.35"/>

  <!-- === GRAPH t0 — variant C: symmetric star topology === -->
  <!-- Edges t0 — balanced, all roughly same weight -->
  <line x1="92" y1="142" x2="58" y2="185" stroke="rgb(127, 119, 221)" stroke-width="1.6" opacity="0.55"/>
  <line x1="92" y1="142" x2="128" y2="188" stroke="rgb(127, 119, 221)" stroke-width="1.6" opacity="0.55"/>
  <line x1="58" y1="196" x2="92" y2="236" stroke="rgb(29, 158, 117)" stroke-width="1.4" opacity="0.5"/>
  <line x1="128" y1="199" x2="92" y2="236" stroke="rgb(29, 158, 117)" stroke-width="1.4" opacity="0.5"/>
  <line x1="58" y1="195" x2="128" y2="195" stroke="rgb(55, 138, 221)" stroke-width="1.4" opacity="0.5"/>
  <!-- Nodes t0 — equal sizes -->
  <circle cx="92" cy="130" r="13" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)" stroke-width="1.5"/>
  <circle cx="52" cy="192" r="11" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)" stroke-width="1.5"/>
  <circle cx="134" cy="195" r="11" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)" stroke-width="1.5"/>
  <circle cx="92" cy="243" r="10" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)" stroke-width="1.3" opacity="0.8"/>

  <!-- === GRAPH t1 — variant C: asymmetry emerging === -->
  <!-- Edges t1 — right side strengthening, left weakening -->
  <line x1="198" y1="137" x2="168" y2="178" stroke="rgb(127, 119, 221)" stroke-width="1" opacity="0.35"/>
  <line x1="198" y1="137" x2="234" y2="170" stroke="rgb(55, 138, 221)" stroke-width="2.4" opacity="0.7"/>
  <line x1="234" y1="184" x2="202" y2="230" stroke="rgb(127, 119, 221)" stroke-width="1.6" opacity="0.55"/>
  <line x1="168" y1="192" x2="234" y2="182" stroke="rgb(55, 138, 221)" stroke-width="1" opacity="0.35" stroke-dasharray="3 2"/>
  <!-- Nodes t1 — blue growing -->
  <circle cx="198" cy="123" r="13" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)" stroke-width="1.5"/>
  <circle cx="162" cy="186" r="9" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)" stroke-width="1.3" opacity="0.8"/>
  <circle cx="240" cy="177" r="14" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)" stroke-width="1.5"/>
  <circle cx="198" cy="237" r="8" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)" stroke-width="1.1" opacity="0.65"/>

  <!-- === GRAPH t2 — variant C: fully reorganized, new node, hub-spoke === -->
  <!-- Edges t2 — blue hub with spokes -->
  <line x1="310" y1="126" x2="344" y2="160" stroke="rgb(55, 138, 221)" stroke-width="3" opacity="0.8"/>
  <line x1="344" y1="180" x2="275" y2="192" stroke="rgb(55, 138, 221)" stroke-width="2" opacity="0.6"/>
  <line x1="344" y1="180" x2="310" y2="228" stroke="rgb(127, 119, 221)" stroke-width="1.6" opacity="0.55"/>
  <line x1="344" y1="186" x2="340" y2="222" stroke="rgb(55, 138, 221)" stroke-width="1.3" opacity="0.5"/>
  <line x1="310" y1="126" x2="275" y2="182" stroke="rgb(127, 119, 221)" stroke-width="0.7" opacity="0.25"/>
  <!-- New 5th node connection -->
  <line x1="344" y1="180" x2="310" y2="168" stroke="rgb(175, 100, 50)" stroke-width="1.4" opacity="0.5"/>
  <!-- Nodes t2 -->
  <circle cx="310" cy="113" r="11" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)" stroke-width="1.5"/>
  <circle cx="270" cy="195" r="7" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)" stroke-width="1" opacity="0.6"/>
  <circle cx="348" cy="172" r="18" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)" stroke-width="2"/>
  <circle cx="310" cy="235" r="9" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)" stroke-width="1.2" opacity="0.7"/>
  <circle cx="343" cy="228" r="7" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)" stroke-width="1" opacity="0.55"/>
  <!-- New node (appears at t2) -->
  <circle cx="305" cy="172" r="8" fill="rgb(255, 237, 220)" stroke="rgb(175, 100, 50)" stroke-width="1.3" opacity="0.75"/>

  <!-- === TEMPORAL EDGES === -->
  <path d="M105 125 C133 112, 166 113, 185 119" stroke="rgb(127, 119, 221)" stroke-width="0.8" stroke-dasharray="4 3" fill="none" opacity="0.3"/>
  <path d="M211 118 C235 108, 275 106, 298 110" stroke="rgb(127, 119, 221)" stroke-width="0.8" stroke-dasharray="4 3" fill="none" opacity="0.3"/>
  <path d="M145 193 C160 188, 185 183, 227 178" stroke="rgb(55, 138, 221)" stroke-width="0.7" stroke-dasharray="3 3" fill="none" opacity="0.25"/>
  <path d="M253 176 C275 173, 300 170, 332 170" stroke="rgb(55, 138, 221)" stroke-width="0.7" stroke-dasharray="3 3" fill="none" opacity="0.25"/>

  <!-- === WORDMARK === -->
  <text x="371" y="155" font-family="ui-monospace, monospace" font-size="52" font-weight="700" letter-spacing="-1" fill="rgb(38, 33, 92)">fSTG</text>
  <text x="375" y="193" font-family="sans-serif" font-size="18" font-weight="500" letter-spacing="2" fill="rgb(83, 74, 183)">TOOLKIT</text>

  <line x1="375" y1="206" x2="640" y2="206" stroke="rgb(206, 192, 246)" stroke-width="0.8"/>

  <text x="375" y="226" font-family="sans-serif" font-size="11.5" letter-spacing="0.3" fill="rgb(15, 110, 86)">fMRI Spatio-Temporal Graph Analysis</text>
  <text x="375" y="244" font-family="sans-serif" font-size="10.5" opacity="0.6" fill="rgb(83, 74, 183)">Open-source · Python · Dash</text>
</svg>